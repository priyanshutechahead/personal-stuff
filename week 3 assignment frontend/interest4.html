</section>
<!-- Search Area -->
<div class="relative mb-stack-md group">
<div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">

</div>
<!-- Tags Grid -->
<div class="flex flex-wrap gap-3 mb-stack-xl max-h-[320px] overflow-y-auto custom-scrollbar pr-2" id="countryGrid">
<!-- Sample tags generated via JS -->
</div>

<div class="flex items-center justify-between pt-stack-md border-t border-outline-variant">
<button class="px-6 py-3 border border-outline-variant text-secondary font-label-caps hover:bg-surface-container transition-all flex items-center gap-2 group">
<span class="material-symbols-outlined text-[18px]">arrow_back</span>

<a class="text-label-caps font-label-caps text-secondary hover:text-primary transition-colors" href="#">Support</a>
</div>
</div>

<script>
        const countries = [
            "Japan", "Iceland", "Norway", "New Zealand", "Portugal", "Italy", "Greece", "Switzerland", 
            "Thailand", "Vietnam", "Canada", "Australia", "Morocco", "France", "Spain", "Mexico", 
            "South Africa", "Peru", "Chile", "Finland", "Denmark", "Scotland", "Ireland", "Germany"
        ];

        const grid = document.getElementById('countryGrid');
        const searchInput = document.getElementById('countrySearch');
        let selectedCountries = new Set();

        function renderCountries(filter = '') {
            grid.innerHTML = '';
            const filtered = countries.filter(c => c.toLowerCase().includes(filter.toLowerCase()));
            
            filtered.forEach(country => {
                const button = document.createElement('button');
                button.textContent = country;
                button.className = `px-4 py-2 border border-outline-variant rounded-full text-body-sm font-body-sm transition-all cursor-pointer hover:border-primary active:scale-95 flex items-center gap-2`;
                
                if (selectedCountries.has(country)) {
                    button.classList.add('country-tag-selected');
                    const icon = document.createElement('span');
                    icon.className = 'material-symbols-outlined text-[14px]';
                    icon.textContent = 'check';
                    button.prepend(icon);
                }

                button.onclick = () => toggleCountry(country);
                grid.appendChild(button);
            });
        }

        function toggleCountry(country) {
            if (selectedCountries.has(country)) {
                selectedCountries.delete(country);
            } else {
                selectedCountries.add(country);
            }
            renderCountries(searchInput.value);
        }

        searchInput.oninput = (e) => {
            renderCountries(e.target.value);
        };

        // Initial Render
        renderCountries();
    </script>
