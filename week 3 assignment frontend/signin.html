<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
            display: inline-block;
            vertical-align: middle;
        }
        
        /* Modern Enterprise Minimal Shadows */
        .depth-level-2 {
            box-shadow: 0px 4px 20px rgba(0,0,0,0.02);
            border: 1px solid #E2E8F0;
        }

        /* Smooth UI transitions */
        .transition-standard {
            transition: all 200ms cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* Subtle noise texture for the background */
        .bg-noise {
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
            opacity: 0.015;
            pointer-events: none;

<body class="bg-background text-on-background font-body-lg min-h-screen flex flex-col antialiased">
<!-- Subtle Background Shader -->
<div class="fixed inset-0 z-[-1] overflow-hidden">

<div class="bg-noise absolute inset-0"></div>
</div>
<!-- Main Navigation (Suppressed for focused login) -->
<!-- Content starts here -->
<main class="flex-grow flex items-center justify-center px-margin-mobile md:px-gutter py-stack-xl">
<div class="w-full max-w-[440px]">
<!-- Brand Anchor -->
<div class="text-center mb-stack-md">
<div class="inline-flex items-center justify-center mb-stack-xs">
<span class="material-symbols-outlined text-primary text-[40px]" data-icon="language" style="font-variation-settings: 'wght' 600;">language</span>
</div>
<h1 class="font-display-lg text-[32px] md:text-display-lg font-bold text-on-surface tracking-tight">GlobeMind AI</h1>
<p class="font-body-sm text-secondary mt-2">Sign in to access distilled intelligence.</p>
</div>
<!-- Login Card -->
<div class="bg-surface-container-lowest depth-level-2 rounded-lg p-stack-md md:p-10 transition-standard">
<form class="space-y-stack-md" onsubmit="return false;">
<!-- Email Field -->
<div class="space-y-2">
<label class="font-label-caps text-label-caps text-secondary block" for="email">Email Address</label>
<div class="relative group">
<input class="w-full h-12 bg-surface-container-low border border-outline-variant rounded-lg px-4 font-body-lg focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-standard" id="email" name="email" placeholder="name@company.com" required="" type="email"/>
</div>
</div>
<!-- Password Field -->
<div class="space-y-2">
<div class="flex justify-between items-center">
<label class="font-label-caps text-label-caps text-secondary" for="password">Password</label>
<a class="font-label-caps text-label-caps text-primary hover:underline transition-standard" href="#">Forgot?</a>
</div>
<div class="relative">
<input class="w-full h-12 bg-surface-container-low border border-outline-variant rounded-lg px-4 font-body-lg focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-standard" id="password" name="password" placeholder="••••••••" required="" type="password"/>
<button class="absolute right-3 top-1/2 -translate-y-1/2 text-secondary hover:text-on-surface transition-colors" type="button">
<span class="material-symbols-outlined text-[20px]" data-icon="visibility">visibility</span>
</button>
</div>
</div>
<!-- CTA Actions -->
<div class="pt-2">
<button class="w-full h-12 bg-primary text-on-primary font-body-lg font-semibold rounded-lg hover:opacity-90 active:scale-[0.98] transition-all duration-200 flex items-center justify-center gap-2" type="submit">
                            Sign In
                            <span class="material-symbols-outlined" data-icon="arrow_forward">arrow_forward</span>
</button>
</div>
<!-- Social Login Divider -->
<div class="relative py-4">
<div class="absolute inset-0 flex items-center">
<div class="w-full border-t border-outline-variant/30"></div>
</div>
<div class="relative flex justify-center">
<span class="bg-surface-container-lowest px-4 font-label-caps text-label-caps text-secondary">Or continue with</span>
</div>
</div>
<!-- Social Grid -->
<div class="grid grid-cols-2 gap-stack-xs">
<button class="flex items-center justify-center gap-2 h-12 border border-outline-variant rounded-lg hover:bg-surface-container-low transition-standard font-body-sm font-medium text-on-surface" type="button">
<span class="material-symbols-outlined text-[20px]" data-icon="google">google</span>
                            Google
                        </button>
<button class="flex items-center justify-center gap-2 h-12 border border-outline-variant rounded-lg hover:bg-surface-container-low transition-standard font-body-sm font-medium text-on-surface" type="button">
<span class="material-symbols-outlined text-[20px]" data-icon="terminal">terminal</span>
                            SSO
                        </button>
</div>
</form>
<!-- Footer Link -->
<div class="mt-stack-md text-center">
<p class="font-body-sm text-secondary">
                        Don't have an account? 
                        <a class="text-primary font-semibold hover:underline" href="#">Create an account</a>
</p>
</div>
</div>
<!-- Global Footer Links -->
<div class="mt-stack-md flex justify-center gap-stack-md">
<a class="font-label-caps text-label-caps text-secondary hover:text-primary transition-colors" href="#">Privacy Policy</a>
<a class="font-label-caps text-label-caps text-secondary hover:text-primary transition-colors" href="#">Terms</a>
<a class="font-label-caps text-label-caps text-secondary hover:text-primary transition-colors" href="#">Support</a>
</div>
</div>
</main>
<!-- Interactive Layer for Form -->
<script>
        document.addEventListener('DOMContentLoaded', () => {
            const form = document.querySelector('form');
            const inputs = form.querySelectorAll('input');
            
            // Subtle focus effects
            inputs.forEach(input => {
                input.addEventListener('focus', () => {
                    input.closest('.depth-level-2')?.classList.add('shadow-md');
                });
                input.addEventListener('blur', () => {
                    input.closest('.depth-level-2')?.classList.remove('shadow-md');
                });
            });

            // Password visibility toggle
            const togglePass = document.querySelector('[data-icon="visibility"]').parentElement;
            const passInput = document.getElementById('password');
            
            togglePass.addEventListener('click', () => {
                const isPass = passInput.type === 'password';
                passInput.type = isPass ? 'text' : 'password';
                togglePass.querySelector('span').innerText = isPass ? 'visibility_off' : 'visibility';
            });
        });
    </script>
</body></html>
